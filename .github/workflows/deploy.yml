name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # preCommands は wrangler-action が npm i wrangler を終えた後に実行される。
          # ここでデプロイ対象から開発用アーティファクト・CI設定・配信不要ファイル・
          # 依存関係再生成で戻ってきたファイルを削除する（配信しない＝物理除外の方針）。
          preCommands: |
            rm -f _*.py
            rm -rf .github
            rm -f .gitignore
            rm -f package.json package-lock.json
            rm -rf node_modules
            rm -rf docs
            rm -f mobile-test.html
            find . \( -name '*.bak' -o -name '*.tmp' -o -name '.DS_Store' \) -delete
            echo '--- pre-deploy top-level ---'
            ls -la
          command: pages deploy . --project-name ai-data-nitoryu-blog --branch main
